# Cloudflare Pages deployment for VMK Construction (Next.js)
# -----------------------------------------------------------
# This project uses @cloudflare/next-on-pages for deployment.
#
# Build command (in Cloudflare Pages dashboard):
#   npx @cloudflare/next-on-pages@1
#
# Set these environment variables in the Cloudflare Pages dashboard
# under Settings → Environment Variables → Production:
#   ADMIN_USERNAME     = <your admin username>
#   ADMIN_PASSWORD     = <your admin password>
#   SESSION_SECRET     = <random 32+ char secret>
#   NEXT_PUBLIC_SITE_URL = https://vmk-construction.com

name = "vmk-construction"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[kv_namespaces]]
# Add KV namespaces here if you need edge storage in the future
# binding = "MY_KV"
# id = "xxx"
