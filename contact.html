<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | VMK Dubai</title>
    <link rel="stylesheet" href="./style.css">

    <!-- Fonts/Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">

    <style>
        .page-header {
            padding: 8rem 5% 4rem;
            background-color: var(--color-bg);
            color: var(--color-text-light);
        }

        .page-title {
            font-family: 'CustomHero', var(--font-heading);
            font-size: clamp(2.5rem, 6vw, 5rem);
            margin-bottom: 1rem;
        }

        .page-content {
            padding: 4rem 5%;
            background: white;
            color: var(--color-text-dark);
            min-height: 60vh;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: var(--font-body);
        }

        .submit-btn {
            background: var(--color-accent);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav class="fixed-nav">
        <div class="logo"><a href="index.html" style="color:inherit; text-decoration:none;">VMK</a></div>
        <div class="nav-links">
            <a href="services.html">Services</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
        <a href="contact.html" class="btn-pill">Get a Quote</a>
    </nav>

    <header class="page-header">
        <h1 class="page-title">Contact Us</h1>
        <p class="hero-subtitle">Let's Build Something Great</p>
    </header>

    <main class="page-content">
        <div class="container">
            <div class="contact-grid">
                <div>
                    <h2>Get in Touch</h2>
                    <p style="margin-bottom: 2rem;">Ready to start your project? Visist our office or send us a message.
                    </p>

                    <div style="margin-bottom: 1rem;">
                        <strong>Address:</strong><br>
                        Business Bay, Dubai, UAE
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <strong>Email:</strong><br>
                        info@vmk-dubai.com
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <strong>Phone:</strong><br>
                        +971 4 000 0000
                    </div>
                </div>

                <form>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Your Email">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Tell us about your project"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-left">
                <span class="footer-logo">VMK</span>
                <p>&copy; 2026 VMK Construction. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>

</html>
